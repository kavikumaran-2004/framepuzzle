<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Open Puzzle</title>
</head>
<body>
<h3>Opening Puzzle…</h3>

<script>
(function () {
  // Incoming: https://kavikumaran-2004.github.io/framepuzzle/p/<pid>
  var path = window.location.pathname || "";
  var parts = path.split("/").filter(Boolean);

  // parts: ["framepuzzle","p","<pid>"]
  var pid = "";
  var pIndex = parts.indexOf("p");
  if (pIndex >= 0 && pIndex + 1 < parts.length) pid = parts[pIndex + 1];

  if (!pid) {
    document.body.innerHTML = "<h3>Missing pid</h3>";
    return;
  }

  var packageName = "com.HobbyDeveloper.framepuzzle";

  // Open app via custom scheme (your app parses ?pid=)
  var intentUrl =
    "intent://puzzle?pid=" + encodeURIComponent(pid) +
    "#Intent;scheme=framepuzzle;package=" + packageName + ";end";

  // Play Store fallback (includes referrer pid=...)
  var playStore =
    "https://play.google.com/store/apps/details?id=" + packageName +
    "&referrer=pid%3D" + encodeURIComponent(pid);

  // Try open app
  window.location.replace(intentUrl);

  // If app didn't open, go to Play Store
  var fallbackTimer = setTimeout(function () {
    if (!document.hidden) window.location.replace(playStore);
  }, 1400);

  // Cancel fallback if app opens
  function cancel() { clearTimeout(fallbackTimer); }
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) cancel();
  });
  window.addEventListener("pagehide", cancel);
  window.addEventListener("blur", cancel);

})();
</script>

</body>
</html>
